# Local development database only. Production uses Neon.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: streamer
      POSTGRES_PASSWORD: streamer
      POSTGRES_DB: streamer_tools
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
